linters:
  # Line length — set generously to avoid noise on long class chains
  LineLength:
    enabled: true
    max: 300

  # Rubocop integration — disabled here, RuboCop runs separately
  RuboCop:
    enabled: false

  # Avoid bare divs when a semantic element would do
  ImplicitDiv:
    enabled: true

  # Classes before IDs in shorthand notation
  ClassesBeforeIds:
    enabled: true

  # Warn on consecutive silent comments
  ConsecutiveComments:
    enabled: true

  # Enforce consistent indentation (2 spaces)
  Indentation:
    enabled: true
    character: space

  # Don't allow trailing whitespace
  TrailingWhitespace:
    enabled: true

  # Disabled — we prefer `= "text"` for text content on new lines
  UnnecessaryStringOutput:
    enabled: false

  # Disabled — we use class: hash when special chars are present (hover:, peer-checked:, etc.)
  ClassAttributeWithStaticValue:
    enabled: false

  # Disabled — some component templates exceed 100 lines
  ViewLength:
    enabled: false

  # Hash attributes spacing
  SpaceInsideHashAttributes:
    enabled: true
    style: space

  # Disabled — we use inline style="display: contents" on turbo frames intentionally
  InlineStyles:
    enabled: false

  # Disabled — consecutive variable assignments are fine for readability
  ConsecutiveSilentScripts:
    enabled: false

  # Disabled — partials use instance variables via controller context
  InstanceVariables:
    enabled: false

  # Warn on empty scripts (e.g. bare `-`)
  EmptyScript:
    enabled: true

exclude:
  - "vendor/**"
  - "node_modules/**"
  - "lib/templates/**"
