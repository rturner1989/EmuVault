default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV.fetch("DB_USERNAME", "emuvault") %>
  password: <%= ENV.fetch("DB_PASSWORD", "emuvault") %>

development:
  <<: *default
  database: emu_vault_development

test:
  <<: *default
  database: emu_vault_test

production:
  <<: *default
  database: emu_vault_production
